<html lang="en">

  <title>Ava Strong 90</title>
  <style>
    :root{color-scheme:light;--ink:#17120f;--soft:#76695f;--paper:#fffaf2;--line:rgba(152,117,68,.24);--gold:#d7ae5f;--rose:#d94f74;--jade:#117463;--black:#11100f;--shadow:0 20px 48px rgba(30,20,14,.18);--radius:8px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;min-height:100svh;color:var(--ink);background:radial-gradient(circle at top left,rgba(215,174,95,.28),transparent 30%),linear-gradient(155deg,#100d0c 0%,#2a1c17 38%,#f8efe4 38.2%,#fffaf2 100%);background-attachment:fixed}button,input,select{font:inherit}button{cursor:pointer}a{color:inherit}svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.shell{width:min(100%,520px);min-height:100svh;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 14px calc(92px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(255,250,242,.06),rgba(255,250,242,.96) 23%,var(--paper));box-shadow:0 28px 90px rgba(0,0,0,.24)}.topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 16px;background:rgba(255,250,242,.78);backdrop-filter:blur(22px)}.brand{display:flex;align-items:center;gap:12px;min-width:0}.mark{display:grid;place-items:center;width:52px;height:52px;flex:0 0 auto;border-radius:15px;color:#fff7dc;background:linear-gradient(145deg,#11100f,#2a211e);border:1px solid rgba(215,174,95,.42);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 16px 34px rgba(18,14,13,.28);font-weight:900;font-size:1.5rem;letter-spacing:0}.eyebrow{margin:0 0 2px;color:#a56d20;font-size:.72rem;font-weight:900;text-transform:uppercase}h1,h2,h3,p{margin-top:0}h1{margin:0;font-size:1.42rem;line-height:1.05}h2{margin-bottom:6px;font-size:1.35rem}h3{margin-bottom:8px;font-size:1rem}.muted{color:var(--soft);font-size:.9rem;line-height:1.45}.icon-btn{display:grid;place-items:center;width:44px;height:44px;border:1px solid rgba(215,174,95,.28);border-radius:var(--radius);color:#fff7dc;background:linear-gradient(145deg,#11100f,#2d211b);box-shadow:0 12px 28px rgba(28,18,12,.2)}.hero{position:relative;overflow:hidden;padding:20px;border-radius:var(--radius);color:#fffaf2;border:1px solid rgba(248,229,184,.24);background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 34%),linear-gradient(145deg,#151110,#34241d 56%,#12100f);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),var(--shadow)}.hero h2{margin:0 0 10px;color:#fffaf2;font-size:2rem;line-height:1.04}.hero p{color:rgba(255,250,242,.76)}.kicker{color:#f5dfaa;font-size:.76rem;font-weight:900;text-transform:uppercase}.stats,.rx{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:16px}.stat,.rx div{min-height:66px;padding:10px;border-radius:var(--radius);border:1px solid rgba(248,229,184,.18);background:rgba(255,255,255,.1)}.stat b{display:block;font-size:1.28rem}.stat span,.rx span{display:block;margin-top:5px;color:rgba(255,250,242,.66);font-size:.72rem;font-weight:800}.section{margin-top:18px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:10px}.grid{display:grid;gap:10px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.card{position:relative;overflow:hidden;padding:14px;border-radius:var(--radius);border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.97),rgba(247,239,226,.9));box-shadow:inset 0 1px 0 rgba(255,255,255,.82),0 16px 36px rgba(35,24,16,.1)}.card:before{content:"";position:absolute;inset:0 0 auto;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--rose),transparent);opacity:.75}.pill-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin:14px 0}.pill,.primary,.ghost{min-height:42px;border-radius:var(--radius);font-weight:850;border:1px solid rgba(152,117,68,.24)}.pill{padding:8px;color:#4b3a2d;background:linear-gradient(#fff,#f6ecdc);font-size:.78rem}.pill.active,.primary{color:#fffaf2;background:linear-gradient(135deg,rgba(248,229,184,.16),transparent 42%),linear-gradient(145deg,#14100f,#3a2921)}.primary{padding:0 14px;border:0}.tag{display:inline-flex;align-items:center;min-height:26px;padding:4px 8px;border-radius:999px;border:1px solid rgba(152,117,68,.2);background:#fff5dd;color:#5d430d;font-size:.72rem;font-weight:850}.tag.rose{background:#ffe0e8;color:#792034}.tag.jade{background:#dff1ec;color:#064f43}.exercise-top{display:flex;align-items:start;justify-content:space-between;gap:12px}.video{display:grid;place-items:center;width:42px;height:42px;flex:0 0 auto;border-radius:var(--radius);color:#fff;text-decoration:none;background:linear-gradient(145deg,#d94f74,#863047);box-shadow:0 10px 20px rgba(143,48,72,.18)}.machine{margin:8px 0 0;color:#684d16;font-size:.78rem;font-weight:850}.cues{display:grid;gap:6px;padding:0;margin:12px 0 0;list-style:none}.cues li{position:relative;padding-left:16px;color:#3e332e;font-size:.87rem;line-height:1.35}.cues li:before{content:"";position:absolute;left:0;top:.55em;width:6px;height:6px;border-radius:50%;background:var(--gold)}.log-grid{display:grid;grid-template-columns:1fr 1fr .86fr;gap:8px;margin-top:12px}label span{display:block;margin-bottom:4px;color:var(--soft);font-size:.68rem;font-weight:900;text-transform:uppercase}input,select{width:100%;min-height:42px;border:1px solid rgba(86,64,43,.18);border-radius:var(--radius);padding:9px 10px;background:#fff;color:var(--ink)}.progress-rail{overflow:hidden;height:10px;border-radius:99px;background:rgba(28,22,19,.14)}.progress-fill{height:100%;background:linear-gradient(90deg,var(--jade),var(--gold),var(--rose))}canvas{display:block;width:100%;height:176px}.history{display:grid;gap:8px}.history-row{display:flex;justify-content:space-between;gap:10px;padding:10px;border-radius:var(--radius);background:#fff;border:1px solid var(--line);font-size:.86rem}.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));width:min(100%,520px);min-height:80px;margin:0 auto;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(17,16,15,.93);backdrop-filter:blur(22px);box-shadow:0 -18px 44px rgba(23,18,15,.22)}.tab{display:grid;place-items:center;gap:3px;min-height:56px;border:0;border-radius:var(--radius);color:rgba(255,250,242,.58);background:transparent;font-size:.69rem;font-weight:850}.tab.active{color:#fffaf2;background:rgba(248,229,184,.14)}.toast{position:fixed;left:14px;right:14px;bottom:calc(92px + env(safe-area-inset-bottom));width:min(492px,calc(100% - 28px));margin:0 auto;padding:13px 14px;border-radius:var(--radius);color:#fffaf2;background:#171210;box-shadow:0 26px 70px rgba(22,14,9,.22);font-weight:850}@media(max-width:374px){.stats,.rx,.two,.log-grid{grid-template-columns:1fr}.pill-row{grid-template-columns:repeat(2,minmax(0,1fr))}h1{font-size:1.16rem}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand"><div class="mark">A</div><div><p class="eyebrow">Cheer strength</p><h1>Ava Strong 90</h1></div></div>
      <button class="icon-btn" id="install" type="button" aria-label="Install app"><svg viewBox="0 0 24 24"><path d="M12 3v11m0 0 4-4m-4 4-4-4M5 15v4h14v-4"/></svg></button>
    </header>
    <main id="app"></main>
  </div>
  <nav class="tabbar" aria-label="Main views">
    <button class="tab active" data-view="today"><svg viewBox="0 0 24 24"><path d="M4 12 12 4l8 8v8H4z"/><path d="M9 20v-6h6v6"/></svg><span>Today</span></button>
    <button class="tab" data-view="plan"><svg viewBox="0 0 24 24"><path d="M7 4v3M17 4v3M4 9h16M6 6h12a2 2 0 0 1 2 2v11H4V8a2 2 0 0 1 2-2Z"/><path d="M8 13h3M8 16h6"/></svg><span>Plan</span></button>
    <button class="tab" data-view="moves"><svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"/><path d="m10 9 5 3-5 3z"/></svg><span>Moves</span></button>
    <button class="tab" data-view="progress"><svg viewBox="0 0 24 24"><path d="M5 19V5M5 19h14M8 15l3-3 3 2 4-6"/></svg><span>Progress</span></button>
    <button class="tab" data-view="fuel"><svg viewBox="0 0 24 24"><path d="M7 4h10l1 6-6 10-6-10z"/><path d="M8 10h8"/></svg><span>Fuel</span></button>
  </nav>
  <script>
    const STORE="ava-strong-90-live",TOTAL=39,$app=document.querySelector("#app");let activeView="today",activeWorkout="base",activeFilter="All",state=JSON.parse(localStorage.getItem(STORE)||"{\"sessions\":[],\"sets\":[]}");
    const phases=[["Foundation","Sessions 1-12","Learn the machines, own clean reps, leave with confidence.","2-3 sets, RPE 6-7, stop with 2-4 reps left."],["Build","Sessions 13-26","Add weight slowly, build stamina, strengthen the base position.","3 sets, RPE 7-8, add weight after top reps feel clean."],["Performance","Sessions 27-39","Turn strength into repeatable competition energy.","3-4 sets, RPE 7-8, sharper reps, never sloppy maxes."]];
    const exercises=[["leg-press","Seated Leg Press","Lower","ProMaxima CM-750 or P-5600 Seated Leg Press","https://www.youtube.com/watch?v=IZxyjW7MPJQ","Feet flat. Press through the whole foot. Stop before hard knee lockout.","Main basing drive for legs and hips."],["leg-curl","Leg Curl","Lower","P-5200 Prone Leg Curl or Leg Extension/Leg Curl combo","https://www.youtube.com/results?search_query=beginner+machine+leg+curl+proper+form","Line knees with the pivot. Pull heels in without lifting hips. Lower slowly.","Protects knees and builds stunt stability."],["leg-extension","Leg Extension","Lower","P-5100 or P-5500 Leg Extension","https://www.youtube.com/watch?v=YyvSfVjQeL0","Pad sits above ankles. Sit tall. Lift, pause, lower under control.","Builds quad control for jumps and landings."],["glute-ham","Glute Ham Developer","Lower","P-5400 Glute Hamstring Developer","https://www.youtube.com/results?search_query=beginner+glute+ham+developer+hip+extension+proper+form","Use short bodyweight reps. Ribs down. Squeeze glutes to rise.","Posterior-chain confidence for powerful basing."],["inner-outer-thigh","Inner / Outer Thigh","Lower","P-6300 Inner Thigh / Outer Thigh","https://www.youtube.com/results?search_query=hip+abductor+adductor+machine+proper+form","Sit tall. Move through a comfortable range. Never bounce.","Hip control for stable stunts and landings."],["chest-press","Chest Press","Upper","P-1000, P-1050, or Chest/Incline/Shoulder Press","https://www.youtube.com/watch?v=xUm0BiZCWlQ","Handles at mid-chest. Shoulder blades back. Wrists stacked.","Press strength for basing and controlled catches."],["incline-chest-press","Incline Chest Press","Upper","P-1300 Incline Chest Press","https://www.youtube.com/results?search_query=machine+incline+chest+press+proper+form","Handles start at upper chest. Press up and forward. No shoulder roll.","Upper chest and shoulder support for lifts."],["shoulder-press","Unilateral Shoulder Press","Upper","P-2200 Unilateral Shoulder Press","https://www.youtube.com/results?search_query=unilateral+machine+shoulder+press+proper+form","Brace ribs down. Press smoothly. Lower without dropping the stack.","Overhead confidence for extensions."],["lateral-raise","Lateral Raise","Upper","P-2100 Lateral Raise","https://www.youtube.com/results?search_query=machine+lateral+raise+proper+form","Shoulders away from ears. Lift to shoulder height. Lower slowly.","Shoulder shape and control without heavy loading."],["lat-pulldown","Hi Lat Pull","Upper","CM-720 Hi Lat Pull","https://www.youtube.com/watch?v=CAwf7n6Luuc","Pull elbows toward ribs. Control the return. Do not pull behind neck.","Back strength for pulling and stabilizing flyers."],["seated-row","Seated Cable Row","Upper","CM-725, P-4200, or P-144 Seated Row","https://www.youtube.com/watch?v=GZbfZ033f74","Sit tall. Pull to lower ribs. Pause without leaning back.","Posture and back strength for long routines."],["rear-delt","Rear Delt / Pec Deck","Upper","P-1100 Rear Deltoid / Pectoral Contractor","https://www.youtube.com/results?search_query=rear+delt+pec+deck+machine+proper+form","Chest on pad. Arms slightly bent. Open wide with control.","Shoulder health and clean upper-body positions."],["assisted-pullup","Assisted Pull-up","Upper","StairMaster Gravitron 2000","https://www.youtube.com/watch?v=DSIFQxx3u-w","Use enough assistance for clean reps. Pull shoulders down first. No kicking.","Confidence builder for real upper-body strength."],["triceps-pushdown","Triceps Pushdown","Upper","CM-746, P-3100, or P-3200 Tricep Press Down","https://www.youtube.com/results?search_query=tricep+pushdown+machine+proper+form","Elbows stay near sides. Press down fully. Return slowly.","Lockout strength for strong arms in stunts."],["rotary-torso","Rotary Torso","Core","P-6200 Rotary Torso","https://www.youtube.com/results?search_query=rotary+torso+machine+proper+form","Brace first. Rotate smoothly. Control back to center.","Core rotation control for routines."],["ab-low-back","Abdominal / Low Back","Core","P-6500 Abdominal / Low Back","https://www.youtube.com/results?search_query=abdominal+low+back+machine+proper+form","Small controlled range. No jerking. Keep breathing.","Core endurance for long competitions."],["cable-column","Adjustable Cable Column","Full Body","CM-730 Adjustable Cable Column","https://www.youtube.com/results?search_query=beginner+cable+machine+exercises+proper+form","Start light. Smooth pull. Stay within three feet of start position.","Flexible accessory station once she feels ready."]];
    const workouts={base:{name:"Base Strength",focus:"Lower-body drive and stable catches",ids:["leg-press","leg-curl","chest-press","seated-row","rotary-torso"]},upper:{name:"Upper Base",focus:"Shoulders, back, arms, posture",ids:["shoulder-press","lat-pulldown","seated-row","triceps-pushdown","rear-delt"]},power:{name:"Power Legs",focus:"Leg strength for jumps, tumbling, and basing",ids:["leg-press","leg-extension","glute-ham","inner-outer-thigh","ab-low-back"]},endurance:{name:"Endurance Core",focus:"Repeatable routine energy and control",ids:["assisted-pullup","cable-column","lateral-raise","rotary-torso","ab-low-back"]}};
    function save(){localStorage.setItem(STORE,JSON.stringify(state))}function toast(msg){const el=document.createElement("div");el.className="toast";el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2200)}function ex(id){return exercises.find(item=>item[0]===id)}function phase(){const done=state.sessions.length;return done>=26?phases[2]:done>=12?phases[1]:phases[0]}function pct(){return Math.min(100,Math.round(state.sessions.length/TOTAL*100))}function latestBest(id){const rows=state.sets.filter(s=>s.id===id&&s.weight);return rows.length?Math.max(...rows.map(s=>Number(s.weight)||0))+" lb best":""}
    function hero(){const p=phase();return `<section class="hero"><span class="kicker">${p[0]} phase</span><h2>${state.sessions.length?"Keep stacking wins.":"Start strong, stay classy."}</h2><p>${p[2]}</p><div class="stats"><div class="stat"><b>${state.sessions.length}/${TOTAL}</b><span>Sessions</span></div><div class="stat"><b>${pct()}%</b><span>90-day progress</span></div><div class="stat"><b>${state.sets.length}</b><span>Sets logged</span></div></div></section>`}
    function exerciseCard(item,mode="log"){const[id,name,cat,machine,video,cue,why]=item,cues=cue.split(". ").filter(Boolean).map(c=>`<li>${c.replace(/\.$/,"")}.</li>`).join(""),best=latestBest(id);return `<article class="card exercise" data-id="${id}"><div class="exercise-top"><div><span class="tag ${cat==="Upper"?"rose":cat==="Core"?"jade":""}">${cat}</span><h3>${name}</h3><p class="muted">${why}</p></div><a class="video" href="${video}" target="_blank" rel="noopener" aria-label="${name} video"><svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"/><path d="m10 9 5 3-5 3z"/></svg></a></div><p class="machine">${machine}</p>${best?`<p class="muted"><b>${best}</b></p>`:""}<ul class="cues">${cues}</ul>${mode==="log"?`<div class="log-grid"><label><span>Weight</span><input inputmode="decimal" data-field="weight" placeholder="lb"></label><label><span>Reps</span><input inputmode="numeric" data-field="reps" placeholder="8-12"></label><label><span>Feel</span><select data-field="feel"><option>Strong</option><option>Good</option><option>Hard</option></select></label></div><div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="primary save-set" type="button">Save set</button></div>`:""}</article>`}
    function today(){const w=workouts[activeWorkout];return `${hero()}<section class="section"><div class="section-head"><div><h2>Today</h2><p class="muted">Pick whichever workout fits the day. Any 3 sessions per week keeps the 90-day plan moving.</p></div></div><div class="pill-row">${Object.entries(workouts).map(([key,val])=>`<button class="pill ${activeWorkout===key?"active":""}" data-workout="${key}">${val.name}</button>`).join("")}</div><div class="card"><span class="tag">${w.name}</span><h3>${w.focus}</h3><p class="muted">${phase()[3]}</p><div class="rx"><div><b>Warm-up</b><span>5-8 min easy cardio</span></div><div><b>Lift</b><span>Clean reps first</span></div><div><b>Finish</b><span>2 min breathing reset</span></div></div></div><div class="grid" style="margin-top:10px">${w.ids.map(id=>exerciseCard(ex(id))).join("")}</div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="primary" id="complete">Complete session</button></div></section>`}
    function plan(){return `${hero()}<section class="section"><h2>90-Day Plan</h2><p class="muted">No fixed calendar needed. Rotate these sessions whenever she can get to the gym, aiming for 3 days per week and at least one recovery day between hard lower-body days.</p><div class="grid">${phases.map(p=>`<article class="card"><span class="tag">${p[1]}</span><h3>${p[0]}</h3><p class="muted">${p[2]}</p><p><b>${p[3]}</b></p></article>`).join("")}</div><div class="section grid">${Object.values(workouts).map(w=>`<article class="card"><h3>${w.name}</h3><p class="muted">${w.focus}</p><p>${w.ids.map(id=>ex(id)[1]).join(" / ")}</p></article>`).join("")}</div></section>`}
    function moves(){const cats=["All","Lower","Upper","Core","Full Body"],list=activeFilter==="All"?exercises:exercises.filter(item=>item[2]===activeFilter);return `<section class="hero"><span class="kicker">Movement library</span><h2>Gym confidence, one machine at a time.</h2><p>Each card gives the exact machine label, simple cues, and a video link so she can walk in knowing what to do.</p></section><section class="section"><div class="pill-row">${cats.map(c=>`<button class="pill ${activeFilter===c?"active":""}" data-filter="${c}">${c}</button>`).join("")}</div><div class="grid">${list.map(item=>exerciseCard(item,"read")).join("")}</div></section>`}
    function progress(){const recent=[...state.sets].slice(-10).reverse();return `${hero()}<section class="section"><div class="card"><h3>90-day runway</h3><div class="progress-rail"><div class="progress-fill" style="width:${pct()}%"></div></div><p class="muted" style="margin-top:10px">${TOTAL-state.sessions.length} sessions left. Progress is based on completed workouts, not perfection.</p></div><div class="grid two" style="margin-top:10px"><div class="card"><h3>Confidence streak</h3><p style="font-size:1.7rem;margin-bottom:0"><b>${Math.min(state.sessions.length,7)}</b></p><p class="muted">recent wins</p></div><div class="card"><h3>Machines touched</h3><p style="font-size:1.7rem;margin-bottom:0"><b>${new Set(state.sets.map(s=>s.id)).size}</b></p><p class="muted">tracked moves</p></div></div><div class="card" style="margin-top:10px"><canvas id="chart" width="460" height="176"></canvas></div><div class="section"><h2>Recent Sets</h2><div class="history">${recent.length?recent.map(s=>`<div class="history-row"><span>${s.name}<br><small>${s.date}</small></span><b>${s.weight||"-"} lb x ${s.reps||"-"}</b></div>`).join(""):`<div class="card muted">No sets logged yet. Save the first set from Today.</div>`}</div></div></section>`}
    function fuel(){return `<section class="hero"><span class="kicker">Fuel</span><h2>Simple support, no confusion.</h2><p>Supplements should be parent-approved and cleared with her doctor, especially for a minor. Food, water, and sleep still matter most.</p></section><section class="section grid"><article class="card"><span class="tag jade">Daily</span><h3>Protein</h3><p class="muted">Aim for a protein source at each meal. A whey or plant protein shake can help after workouts when real food is not convenient.</p></article><article class="card"><span class="tag">Hydration</span><h3>Electrolytes</h3><p class="muted">Useful on long practice days or sweaty gym sessions. Choose low-sugar options unless she needs extra carbs for a long day.</p></article><article class="card"><span class="tag rose">Optional</span><h3>Creatine monohydrate</h3><p class="muted">Common strength supplement, but because she is 17, use only if parent and clinician are comfortable. Typical adult dose is 3-5g/day.</p></article><article class="card"><span class="tag">Recovery</span><h3>Sleep and snacks</h3><p class="muted">Best pre-gym snack: carbs plus protein, like Greek yogurt and fruit, turkey wrap, smoothie, or eggs and toast.</p></article></section>`}
    function render(){const views={today,plan,moves,progress,fuel};$app.innerHTML=views[activeView]();bind();if(activeView==="progress")drawChart()}function bind(){document.querySelectorAll("[data-workout]").forEach(btn=>btn.onclick=()=>{activeWorkout=btn.dataset.workout;render()});document.querySelectorAll("[data-filter]").forEach(btn=>btn.onclick=()=>{activeFilter=btn.dataset.filter;render()});document.querySelectorAll(".save-set").forEach(btn=>btn.onclick=()=>{const card=btn.closest(".exercise"),item=ex(card.dataset.id),get=field=>card.querySelector(`[data-field="${field}"]`).value.trim();state.sets.push({id:item[0],name:item[1],date:new Date().toLocaleDateString(),weight:get("weight"),reps:get("reps"),feel:get("feel")});save();toast("Set saved.");render()});const done=document.querySelector("#complete");if(done)done.onclick=()=>{state.sessions.push({date:new Date().toLocaleDateString(),workout:workouts[activeWorkout].name});save();toast("Workout complete. That counts.");render()}}function drawChart(){const canvas=document.querySelector("#chart");if(!canvas)return;const ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="rgba(84,64,43,.18)";ctx.lineWidth=1;for(let y=28;y<160;y+=32){ctx.beginPath();ctx.moveTo(18,y);ctx.lineTo(442,y);ctx.stroke()}const data=state.sessions.slice(-12).map((_,i)=>i+1);if(!data.length){ctx.fillStyle="#76695f";ctx.font="14px system-ui";ctx.fillText("Complete a workout to start the chart.",82,92);return}ctx.strokeStyle="#d94f74";ctx.lineWidth=4;ctx.beginPath();data.forEach((d,i)=>{const x=24+i*(408/Math.max(1,data.length-1)),y=148-d*8;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle="#117463";data.forEach((d,i)=>{const x=24+i*(408/Math.max(1,data.length-1)),y=148-d*8;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill()})}
    document.querySelectorAll(".tab").forEach(tab=>tab.onclick=()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");activeView=tab.dataset.view;render()});document.querySelector("#install").onclick=()=>toast("On iPhone: open this link in Safari, tap Share, then Add to Home Screen.");render();
  </script>
