<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#120F0E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ava Strong 90" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ava Strong 90</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="splash" aria-hidden="true">
      <div class="splash-card">
        <div class="splash-logo">A</div>
        <p class="eyebrow">Ava Strong 90</p>
      </div>
    </div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img src="./icon.svg" class="brand-mark" alt="" />
          <div>
            <p class="eyebrow">Cheer strength</p>
            <h1>Ava Strong 90</h1>
          </div>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="Install app">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v11m0 0 4-4m-4 4-4-4M5 15v4h14v-4" />
          </svg>
        </button>
      </header>

      <main class="content">
        <section class="view is-active" id="todayView" aria-labelledby="todayTitle"></section>
        <section class="view" id="planView" aria-labelledby="planTitle"></section>
        <section class="view" id="libraryView" aria-labelledby="libraryTitle"></section>
        <section class="view" id="progressView" aria-labelledby="progressTitle"></section>
        <section class="view" id="fuelView" aria-labelledby="fuelTitle"></section>
      </main>

      <nav class="tabbar" aria-label="Main views">
        <button class="tab is-active" data-view="todayView" type="button" aria-current="page">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 12 12 4l8 8v8H4z" />
            <path d="M9 20v-6h6v6" />
          </svg>
          <span>Today</span>
        </button>
        <button class="tab" data-view="planView" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4v3M17 4v3M4 9h16M6 6h12a2 2 0 0 1 2 2v11H4V8a2 2 0 0 1 2-2Z" />
            <path d="M8 13h3M8 16h6" />
          </svg>
          <span>Plan</span>
        </button>
        <button class="tab" data-view="libraryView" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5h14v14H5z" />
            <path d="m10 9 5 3-5 3z" />
          </svg>
          <span>Moves</span>
        </button>
        <button class="tab" data-view="progressView" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 19V5" />
            <path d="M5 19h14" />
            <path d="M8 15l3-3 3 2 4-6" />
          </svg>
          <span>Progress</span>
        </button>
        <button class="tab" data-view="fuelView" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h10l1 6-6 10-6-10z" />
            <path d="M8 10h8" />
          </svg>
          <span>Fuel</span>
        </button>
      </nav>
    </div>

    <template id="toastTemplate">
      <div class="toast" role="status"></div>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
